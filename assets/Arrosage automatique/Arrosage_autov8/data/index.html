        <table>

                <th><button onclick="controlValve('6', 'on')">On</button></th>

                <th>
                    <div class="status">
                        <span id="status6" class="indicator red"></span>
                    </div>
                </th>
            </tr>
        </table>
    </div>
</div>

            <label for="time1">Temps d'arrosage (minutes):</label>

                <th><button onclick="controlValveWithTimer('1')">Start</button></th>
